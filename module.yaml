product:
  type: kmp/lib
  platforms: [ android, jvm ]

dependencies:
  - $compose.foundation
  - $compose.material3

repositories:
    - id: github
      url: https://maven.pkg.github.com/meowgitcom/ui
      publish: true
      credentials:
        file: ./local.properties
        usernameKey: github.user
        passwordKey: github.token

settings:
  compose: enabled
  publishing:
    enabled: true
    version: 0.0.1
    group: "com.meowgit"
    artifactId: ui