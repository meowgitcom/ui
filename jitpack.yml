jdk:
  - openjdk21
before_install:
  - yes | /opt/android-sdk-linux/cmdline-tools/latest/bin/sdkmanager --licenses
install:
  - ./kotlin build && mvn install:install-file -Dfile="$(find build -name '*.aar' | head -1)" -DgroupId=com.github.meowgitcom -DartifactId=ui -Dversion="$VERSION" -Dpackaging=aar -DgeneratePom=true