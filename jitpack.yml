jdk:
  - openjdk21
install:
  - ./kotlin build || true
  - yes | /opt/android-sdk-linux/cmdline-tools/latest/bin/sdkmanager --licenses
  - ln -sf android-googlexr-license /opt/android-sdk-linux/licenses/license-99097288 2>/dev/null || true
  - rm -rf build
  - ./kotlin build
  - mvn install:install-file -Dfile="$(find build -name '*.aar' | head -1)" -DgroupId=com.github.meowgitcom -DartifactId=ui -Dversion="$VERSION" -Dpackaging=aar -DgeneratePom=true